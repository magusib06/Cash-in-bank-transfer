<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liquid Payment Portal</title>
    
    <!-- Google Fonts: Inter (Clean, Modern) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            --text-color: #ffffff;
            --input-bg: rgba(255, 255, 255, 0.1);
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #0f0c29;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        /* --- ANIMATED LIQUID BACKGROUND --- */
        .liquid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ff00cc, #333399, #00d4ff, #ff00cc);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            z-index: -1;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Orbs for Depth */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 10s infinite ease-in-out;
        }
        .orb-1 { width: 300px; height: 300px; background: #ff00cc; top: -50px; left: -50px; }
        .orb-2 { width: 400px; height: 400px; background: #00d4ff; bottom: -100px; right: -100px; animation-delay: -5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 50px); }
        }

        /* --- GLASS CARD CONTAINER --- */
        .glass-card {
            width: 90%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px 25px;
            box-shadow: var(--glass-shadow);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- TYPOGRAPHY --- */
        h2 {
            text-align: center;
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        p.subtitle {
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* --- FORM ELEMENTS --- */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0.9;
            padding-left: 10px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
            transition: color 0.3s;
        }

        input, select {
            width: 100%;
            padding: 16px 15px 16px 45px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        /* Focus States */
        input:focus, select:focus {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.6);
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        /* Custom Select Arrow */
        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: '\f107';
            font-family: "Font Awesome 5 Free";
            font-weight: 900;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.7);
            pointer-events: none;
        }

        /* --- SUBMIT BUTTON (Enhanced) --- */
        .submit-btn {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn i {
            margin-right: 10px;
        }

        /* --- SUCCESS OVERLAY --- */
        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }

        .success-circle {
            width: 80px;
            height: 80px;
            background: #2ecc71;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.6);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .success-circle i {
            font-size: 40px;
            color: white;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .success-text h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        .success-text p {
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <!-- Animated Background Elements -->
    <div class="liquid-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Main Glass Card -->
    <div class="glass-card">
        
        <h2>Payment</h2>
        <p class="subtitle">Secure Liquid Transaction</p>

        <form action="https://api.web3forms.com/submit" method="POST" id="paymentForm">
            
            <!-- Hidden Fields -->
            <input type="hidden" name="access_key" value="dff54b44-2b0d-4fd3-aac8-d69399652672">
            <input type="hidden" name="subject" value="New Cash In Transaction">

            <!-- Payment Method -->
            <div class="form-group">
                <label>Payment Method</label>
                <div class="select-wrapper">
                    <select name="payment_type" required>
                        <option value="" disabled selected>Select Method</option>
                        <option value="Cash In">Cash In</option>
                        <option value="Bank Transfer">Bank Transfer</option>
                    </select>
                </div>
            </div>

            <!-- Full Name -->
            <div class="form-group">
                <label>Gcash Name / Bank Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" name="name" placeholder="John Doe" required>
                </div>
            </div>

            <!-- Contact / Bank Number -->
            <div class="form-group">
                <label>Contact / Bank Number</label>
                <div class="input-wrapper">
                    <i class="fas fa-phone-alt"></i>
                    <input type="tel" name="number" placeholder="0912-000-0000" inputmode="numeric" required>
                </div>
            </div>

            <!-- Amount (₱) -->
            <div class="form-group">
                <label>Amount (₱)</label>
                <div class="input-wrapper">
                    <i class="fas fa-wallet"></i>
                    <input type="number" name="price" placeholder="0.00" inputmode="decimal" required>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn">
                <i class="fas fa-paper-plane"></i> Submit Payment
            </button>

        </form>
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successMsg">
        <div class="success-circle">
            <i class="fas fa-check-circle"></i>
        </div>
        <div class="success-text">
            <h3>Success!</h3>
            <p>Your payment request has been sent.</p>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        const form = document.getElementById('paymentForm');
        const successMsg = document.getElementById('successMsg');

        form.addEventListener('submit', function(e) {
            // Show success animation
            successMsg.style.display = 'flex';
            
            // Uncomment the line below to actually submit the form after showing the message
            // form.submit();
        });
    </script>

</body>
</html>
